# [Do not change manually — managed by Superagent]
# Personal signals — feedback, behavioural cues, and self-development hints
# captured about your own practice / habits / growth areas.
# Distinct from `action-signals.yaml` (which captures workspace + framework
# changes the agent should make). Personal signals describe how YOU want to
# grow / change behaviour.
#
# Capture sources:
#   - Self-reflection in chat ("I should sleep more", "next time I should call
#     ahead before showing up at the dentist's").
#   - Partner / family feedback (relayed by the user).
#   - Pattern Superagent notices (skipped gym 5 of 7 Tuesdays; called Mom
#     once in the last 3 months when target was monthly; finished only 2 of
#     last 8 books started).
#
# Surfaced via the `personal-signals` skill on request and rolled up
# periodically into the `Self` domain's `history.md`.
#
# Append-only. Mutate only `status`, `surfaced_count`, `last_surfaced`,
# `practiced_at`, and `notes` on existing rows.

schema_version: 1
last_updated: ""

