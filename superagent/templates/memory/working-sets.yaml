# [Do not change manually — managed by Superagent]
# Superagent memory: per-skill working-set telemetry (schema reference).
#
# Implements: ideas-better-structure.md item #23 + perf-improvement-ideas.md
# (anti-patterns + measurement).
#
# The actual telemetry is stored in `_memory/working-sets.jsonl` (one JSON
# row per skill invocation; appended in real time). This YAML file documents
# the row schema and serves as the agent's reference when reading the log.
#
# What gets recorded per skill invocation:
#   - Files read (with paths + size in bytes + offset/limit if range-read)
#   - Sources cache hits / misses
#   - MCP / CLI tool calls (server, tool, args hash, latency)
#   - Outputs produced (paths + bytes)
#   - Total estimated tokens consumed (heuristic: total bytes / 4)
#   - Total wall-clock latency in milliseconds
#
# The Supertailor's strategic pass reads this log to spot:
#   - Skills that consistently over-read.
#   - Skills that re-read the same file multiple times in one invocation.
#   - Skills that skip obvious local sources and go straight to MCPs.
#   - Skills that should batch parallel reads but chain them sequentially.
#
# Privacy note: working-sets.jsonl contains paths and sizes — NOT content.
# Lives in workspace/_memory/ (gitignored) like everything else.

