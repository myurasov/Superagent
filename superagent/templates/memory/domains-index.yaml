# [Do not change manually — managed by Superagent]
# Superagent memory: index of life domains (Health, Finances, Home, Vehicles,
# Assets, Pets, Family, Travel, Career, Business, Education, Hobbies, Self,
# plus any custom).
# init() seeds the 13 default domains; user adds more via add-domain skill,
# or accepts auto-detected suggestions per contracts/domains-and-assets.md
# § 6.4b.

schema_version: 1

domains:
  # Each domain:
  #   id              — Stable slug (unique, lowercase, hyphenated). The folder under
  #                      workspace/Domains/ uses Title-cased name; the id
  #                      is the lowercase form.
  #   name            — Human-readable title (folder name format).
  #   scope           — One-line description of what this domain covers.
  #   priority        — P0 | P1 | P2 | P3 (for sequencing; rarely set above P2).
  #   status          — active | paused | completed | archived.
  #   path            — Workspace-relative folder
  #                      (e.g. "workspace/Domains/Health").
  #   parent          — Optional id of a parent domain (per ideas-better-structure
  #                      item #10). null = top-level. Sub-domain folders nest under
  #                      parent's `Domains/<Parent>/<Child>/`.
  #   handle          — Operational handle in `<kind>:<slug>` form (per item #20).
  #                      Example: "domain:health". Optional but recommended.
  #   visibility      — private | household | public (per item #19). Default private.
  #                      Sets default for child entities scoped to this domain.
  #   provenance      — Where this row came from (per item #4):
  #                      { source: "user|<skill>|<ingestor>|init|derived",
  #                        source_id: "<optional anchor>",
  #                        at: <iso datetime>,
  #                        verified_at: <optional iso> }
  #   created         — ISO 8601 date when the row was created.
  #   last_updated    — ISO 8601 of last meaningful update.
  #   tags            — Labels for filtering and reporting.
  #   notes           — Free-form supplementary notes.
  - id: "health"
    name: "Health"
    scope: "Medical, dental, vision, mental health, prescriptions, vaccines, vitals, family medical history"
    priority: "P1"
    status: "active"
    path: "workspace/Domains/Health"
    parent: null
    handle: "domain:health"
    visibility: "private"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "finances"
    name: "Finances"
    scope: "Operational financial life — bills, banking accounts (the operational tubes), credit cards, loans, mortgages, insurance policies, payroll, taxes, budget, cash flow. Holdings themselves (stocks, significant cash positions, bonds, crypto) live in Assets."
    priority: "P1"
    status: "active"
    path: "workspace/Domains/Finances"
    parent: null
    handle: "domain:finances"
    visibility: "private"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: "Owns the OPERATIONAL machinery — accounts as routing/access, debts, recurring outflows, cash flow, tax filing. The HOLDINGS inside accounts (equity positions, large cash reserves, crypto, bonds, treasuries) live in Assets. Bank account = Finances; the $200k cash position in it = Assets. Brokerage account = Finances; the AAPL shares inside = Assets."
  - id: "home"
    name: "Home"
    scope: "Mortgage / rent, utilities, HOA, maintenance schedule, contractors, security, deliveries"
    priority: "P1"
    status: "active"
    path: "workspace/Domains/Home"
    parent: null
    handle: "domain:home"
    visibility: "household"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "vehicles"
    name: "Vehicles"
    scope: "Every vehicle owned (cars, bikes, motorcycles, RVs, boats); registration, insurance, maintenance, fuel"
    priority: "P2"
    status: "active"
    path: "workspace/Domains/Vehicles"
    parent: null
    handle: "domain:vehicles"
    visibility: "household"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "assets"
    name: "Assets"
    scope: "Things of value worth tracking — physical (electronics, appliances, jewelry, instruments, tools, art, collectibles) AND financial (stock holdings, ETFs, bonds, crypto, significant cash positions, precious metals, treasuries) AND real estate. Excludes vehicles (Vehicles) and the home structure / fixtures (Home). The asset is the holding itself; the operational account it lives in stays in Finances."
    priority: "P2"
    status: "active"
    path: "workspace/Domains/Assets"
    parent: null
    handle: "domain:assets"
    visibility: "household"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: "Net-worth view. Assets are stores of wealth — physical or financial. A row in assets-index.yaml has kind: physical | financial | real_estate, and (for financial) a held_in_account field pointing at the Finances-side account. Significant cash positions (above the threshold in config.preferences.assets.cash_position_threshold) are tracked here too."
  - id: "pets"
    name: "Pets"
    scope: "Each pet's vet, vaccinations, prescriptions, food, grooming, boarding"
    priority: "P2"
    status: "active"
    path: "workspace/Domains/Pets"
    parent: null
    handle: "domain:pets"
    visibility: "household"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "family"
    name: "Family"
    scope: "Spouse, kids, parents, siblings; school calendars, kids' doctors, extracurriculars, family events"
    priority: "P1"
    status: "active"
    path: "workspace/Domains/Family"
    parent: null
    handle: "domain:family"
    visibility: "household"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "travel"
    name: "Travel"
    scope: "Trips planned and past, flights, hotels, rentals, packing lists, frequent-flier numbers, passports"
    priority: "P2"
    status: "active"
    path: "workspace/Domains/Travel"
    parent: null
    handle: "domain:travel"
    visibility: "household"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "career"
    name: "Career"
    scope: "Resume, certifications, performance reviews, learning goals, networking, salary history"
    priority: "P2"
    status: "active"
    path: "workspace/Domains/Career"
    parent: null
    handle: "domain:career"
    visibility: "private"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "business"
    name: "Business"
    scope: "Side income, freelancing, consulting, sole-proprietor / LLC operations — clients, contracts, invoices, business expenses, business taxes, vendor relationships (separate from W-2 Career employment)"
    priority: "P2"
    status: "active"
    path: "workspace/Domains/Business"
    parent: null
    handle: "domain:business"
    visibility: "private"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "education"
    name: "Education"
    scope: "Active enrollment in a degree / certificate program (yourself — kids' schooling lives in Family). Courses in flight, credits earned, credentials being pursued, study schedule, advisors, registrar, transcripts, FAFSA / financial aid, employer tuition assistance. Distinct from Career which owns the W-2 employment side."
    priority: "P3"
    status: "active"
    path: "workspace/Domains/Education"
    parent: null
    handle: "domain:education"
    visibility: "private"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: "P3 by default — most adults aren't actively in a degree program. The folder materializes (per § 6.4a) only when the first row of education data lands. A user enrolled in a multi-year program often promotes this to P1/P2."
  - id: "hobbies"
    name: "Hobbies"
    scope: "Each meaningful hobby — fitness, reading log, side project, garden, workshop, etc."
    priority: "P3"
    status: "active"
    path: "workspace/Domains/Hobbies"
    parent: null
    handle: "domain:hobbies"
    visibility: "private"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default"]
    notes: ""
  - id: "self"
    name: "Self"
