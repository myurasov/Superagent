    priority: "P2"
    status: "active"
    path: "workspace/Domains/Self"
    parent: null
    handle: "domain:self"
    visibility: "private"
    provenance: { source: "init", at: null }
    created: null
    last_updated: null
    tags: ["default", "self-development"]
    notes: ""
